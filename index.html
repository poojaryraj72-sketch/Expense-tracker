<DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport"
             content="width=device-width,initial-scale=1.0">
            <title>Expense Tracker</title>
            <link rel="stylesheet" href="style.css">
        </head>
        <body>
            <div class="container">

                <h1>Expense tracker</h1>

                <div class="dashboard">
                    <div class="card">
                        <h3>Total spent</h3>
                        <p id="totalSpent">0</p>
                    </div>
                    <div class="card">
                        <h3>Transaction</h3>
                        <p id="transactionCount">0</p>
                    </div>

                    <div class="card">
                        <h3>Highest Expenses</h3>
                        <p id="highestExpense">0</p>
                    </div>

                    <div class="card">
                        <h3>Average</h3>
                        <p id="averageExpense">0</p>
                    </div>

                    <div class="card">
                        <h3>Monthly Budget</h3>
                        <p id="budgetDisplay">0</p>
                    </div>

                    <div class="card">
                        <h3>Remaining budget</h3>
                        <p id="remainingBudget">0</p>
                    </div>
                </div>

                <p id="budgetWarning"></p>

                <div class="budget-section">
                    <input type="number" id="budgetInput" placeholder="Enter Monthly budget">
                    <button id="saveBudget">Save budget</button>
                </div>

                <div class="expense-form">
                    <input type="text" id="description" placeholder="Expense Description">
                    <input type="number" id="amount" placeholder="Enter Amount">
                    <select id="category">
                        <option value="">Select category</option>
                        <option>Food</option>
                        <option>Travel</option>
                        <option>Shopping</option>
                        <option>Bills</option>
                        <option>Entertainment</option>
                        <option>Other</option>
                    </select>
                    <input type="date" id="date">
                    <button id="addBtn">Add Expenses</button>
                </div>

                <select id="categoryFilter">
                        <option value="All">All category</option>
                        <option value="Food">Food</option>
                        <option value="Travel">Travel</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Other">Other</option>
                </select>

                <h2 id="total">Total: 0</h2>
                <ul id="expenseList"></ul>

                <h2>Expense breakdown</h2>
                <canvas id="expenseChart"></canvas>
            </div>
            <script src="chart.umd.min.js"></script>
            <script src="script.js"></script>
        </body>
    </html>
</DOCTYPE>
